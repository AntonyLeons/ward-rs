name: docker-image
on: 
  release:
    types: [published]

permissions:
  contents: write
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to DockerHub
        uses: docker/login-action@v4 
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      - name: Get the tag name
        run: echo "TAG=${GITHUB_REF/refs\/tags\//}" >> $GITHUB_ENV
      - name: Build and push Docker images
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: antonyleons/ward-rs:latest,antonyleons/ward-rs:${{ env.TAG }}

  build-binaries:
    name: Build Native Binaries
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: ward-rs
            asset_name: ward-linux-amd64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: ward-rs
            asset_name: ward-linux-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: ward-rs
            asset_name: ward-macos-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: ward-rs
            asset_name: ward-macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: ward-rs.exe
            asset_name: ward-windows-amd64.exe
          - os: windows-latest
            target: i686-pc-windows-msvc
            artifact_name: ward-rs.exe
            asset_name: ward-windows-x86.exe

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (for Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        uses: taiki-e/install-action@cross

      - name: Build binary
        run: |
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi
        shell: bash

      - name: Rename artifact
        shell: bash
        run: mv target/${{ matrix.target }}/release/${{ matrix.artifact_name }} ./${{ matrix.asset_name }}

      - name: Upload to Release
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ matrix.asset_name }}
